explorer = "https://gnosisscan.io"

# Deployed contract addresses (GNOSIS MAINNET - DEPLOYED June 4, 2026)
# wsXmrHub acts as the vault manager (diamond proxy)
vault_manager = "0xd32e2ece901094550b81ab5051a72256761514d6"
wsxmr_token = "0x8890f651190c838651623de077474a98e37803ab"
liquidity_router = "0x3235ffe7b51b3726bc0f398da21ed0583103f106"

# Facet addresses (for reference - all calls go through vault_manager)
redstone_oracle_facet = "0x01acec458fd3e8508510cbdc03a8f64532a10618"
vault_facet = "0xf2ec5240c442bba6674a873343ec43c451467229"
mint_facet = "0x35da334de761b200da3242429b884a00509bc32b"
burn_facet = "0x779e5a10f4ba60fbc87c1dee79f09168547fda09"
liquidation_facet = "0xbc5ffaaa057030b5e6b1f13807f54fd029c57c94"
yield_facet = "0x6d242f08ec7d704b5824f1334c192360f2966add"

# Oracle configuration
pyth_oracle = "0x2880aB155794e7179c9eE2e38200202908C17B43"
pyth_hermes_url = "https://hermes.pyth.network"

# Collateral token (sDAI on Gnosis)
collateral_token = "0xaf204776c7245bF4147c2612BF6e5972Ee483701"

[unichain_testnet]
chain_id = 1301
name = "Unichain Sepolia Testnet"
rpc_url = "https://sepolia.unichain.org"
ws_url = "wss://sepolia.unichain.org/ws"
explorer = "https://sepolia.uniscan.xyz"

# Placeholder addresses - update when deployed to Unichain
vault_manager = "0x0000000000000000000000000000000000000000"
wsxmr_token = "0x0000000000000000000000000000000000000000"
pyth_oracle = "0x0000000000000000000000000000000000000000"
pyth_hermes_url = "https://hermes.pyth.network"

[monero]
# Monero daemon RPC configuration
# The LP node connects to a Monero daemon (monerod) for blockchain data
# You can use a public node or run your own
daemon_url = "https://xmr-node.cakewallet.com:18081"
network = "mainnet"  # or "stagenet" for testing

[lp_node]
# Database path
db_path = "./lp-node-db"

# Logging level (error, warn, info, debug, trace)
log_level = "info"

# Health check interval (seconds)
health_check_interval = 300

# Collateral ratio targets
min_collateral_ratio = 150  # 150%
liquidation_threshold = 120  # 120%
target_collateral_ratio = 180  # 180% (safety buffer)

[api]
# API server configuration
port = 3001
# Rate limiting (requests per minute per IP)
rate_limit_per_minute = 60

[admin]
# Admin API authentication
# IMPORTANT: Change this secret in production!
secret = "change_this_in_production_use_env_var"

[quote]
# Quote configuration
ttl_seconds = 60
min_xmr_amount = 10000  # 0.00001 XMR in atomic units
max_xmr_amount = 1000000000000  # 1 XMR in atomic units
mint_fee_bps = 100  # 1.00%
burn_reward_bps = 50  # 0.50%
griefing_deposit_wei = "10000000000000000"  # 0.01 ETH
mint_ready_bond_wei = "10000000000000000"  # 0.01 ETH

[oracle]
# Oracle price pusher configuration
is_price_pusher = false  # Set to true for only ONE LP node per deployment
push_threshold_bps = 25  # Push if price drifts > 0.25%
max_age_secs = 90  # Push if last update older than 90 seconds
poll_interval_secs = 30  # Check prices every 30 seconds
