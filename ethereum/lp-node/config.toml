# WrapSynth LP Node Configuration
# Network and contract addresses

[gnosis]
chain_id = 100
name = "Gnosis Chain"
rpc_url = "https://rpc.gnosischain.com"
ws_url = "wss://gnosis-rpc.publicnode.com"
explorer = "https://gnosisscan.io"

# Contract addresses are loaded from the canonical root deployment.json.
# Do NOT edit addresses here — edit ../../deployment.json instead.
# Operational settings (ports, intervals, thresholds) belong in this file.

# The following addresses are overridden at runtime by deployment.json.
# They remain as fallbacks only for config validation; actual values come from:
#   ../../deployment.json  (or DEPLOYMENT_JSON env override)
vault_manager = "0x0000000000000000000000000000000000000000"
wsxmr_token = "0x0000000000000000000000000000000000000000"
liquidity_router = "0x0000000000000000000000000000000000000000"

# Facet addresses (for reference - all calls go through vault_manager)
redstone_oracle_facet = "0x0000000000000000000000000000000000000000"
vault_facet = "0x0000000000000000000000000000000000000000"
mint_facet = "0x0000000000000000000000000000000000000000"
burn_facet = "0x0000000000000000000000000000000000000000"
liquidation_facet = "0x0000000000000000000000000000000000000000"
yield_facet = "0x0000000000000000000000000000000000000000"

# Oracle configuration (overridden by deployment.json)
pyth_oracle = "0x0000000000000000000000000000000000000000"
pyth_hermes_url = ""

# Collateral token (overridden by deployment.json)
collateral_token = "0x0000000000000000000000000000000000000000"

[unichain_testnet]
chain_id = 1301
name = "Unichain Sepolia Testnet"
rpc_url = "https://sepolia.unichain.org"
ws_url = "wss://sepolia.unichain.org/ws"
explorer = "https://sepolia.uniscan.xyz"

# Placeholder addresses - update when deployed to Unichain
vault_manager = "0x0000000000000000000000000000000000000000"
wsxmr_token = "0x0000000000000000000000000000000000000000"
pyth_oracle = "0x0000000000000000000000000000000000000000"
pyth_hermes_url = "https://hermes.pyth.network"

[base_sepolia]
chain_id = 84532
name = "Base Sepolia"
rpc_url = "https://sepolia.base.org"
ws_url = "wss://base-sepolia-rpc.publicnode.com"
explorer = "https://sepolia.basescan.org"

# Contract addresses are loaded from deployment.base-sepolia.json.
# Do NOT edit addresses here — edit ../../deployment.base-sepolia.json instead.
vault_manager = "0x0000000000000000000000000000000000000000"
wsxmr_token = "0x0000000000000000000000000000000000000000"

[monero]
# Monero daemon RPC configuration
# The LP node connects to a Monero daemon (monerod) for blockchain data
# You can use a public node or run your own
daemon_url = "https://xmr-node.cakewallet.com:18081"
network = "mainnet"  # or "stagenet" for testing

[lp_node]
# Database path
db_path = "./lp-node-db"

# Logging level (error, warn, info, debug, trace)
log_level = "info"

# Health check interval (seconds)
health_check_interval = 300

# Collateral ratio targets
min_collateral_ratio = 150  # 150%
liquidation_threshold = 120  # 120%
target_collateral_ratio = 180  # 180% (safety buffer)

[api]
# API server configuration
port = 3001
# Rate limiting (requests per minute per IP)
rate_limit_per_minute = 60

[admin]
# Admin API authentication
# IMPORTANT: Change this secret in production!
secret = "change_this_in_production_use_env_var"

[quote]
# Quote configuration
ttl_seconds = 60
min_xmr_amount = 10000  # 0.00001 XMR in atomic units
max_xmr_amount = 1000000000000  # 1 XMR in atomic units
mint_fee_bps = 100  # 1.00%
burn_reward_bps = 50  # 0.50%
griefing_deposit_wei = "10000000000000000"  # 0.01 ETH
mint_ready_bond_wei = "10000000000000000"  # 0.01 ETH

[oracle]
# Oracle price pusher configuration
is_price_pusher = false  # Set to true for only ONE LP node per deployment
push_threshold_bps = 25  # Push if price drifts > 0.25%
max_age_secs = 90  # Push if last update older than 90 seconds
poll_interval_secs = 30  # Check prices every 30 seconds

[arbitrage]
# Arbitrage bot configuration - keeps wsXMR price aligned with real XMR price
# Contract addresses (pool, swap_helper, sDAI, factory) are loaded from deployment.json.
enabled = true
pool_address = "0x0000000000000000000000000000000000000000"
swap_helper = "0x0000000000000000000000000000000000000000"
sdai_address = "0x0000000000000000000000000000000000000000"
factory_address = "0x0000000000000000000000000000000000000000"
threshold_bps = 100  # Trade if pool price deviates > 1% from oracle (100 basis points)
max_trade_sdai = "100000000000000000"  # 0.1 sDAI max per trade
max_trade_wsxmr = "100000000000"  # 1,000 wsXMR max per trade (8 decimals)
slippage_bps = 100  # 1% slippage tolerance
poll_interval_secs = 60  # Check for arbitrage every 60 seconds (reduced from 15s to avoid log spam)
min_profit_bps = 50  # Minimum 0.5% profit after fees to trade
