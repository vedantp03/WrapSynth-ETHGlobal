[profile.default]
src = "unlink-integration"
test = "test"
out = "out"
libs = ["lib"]
cache_path = "cache_forge"
solc_version = "0.8.28"
evm_version = "cancun"

# Optimizer settings
optimizer = true
optimizer_runs = 200
via_ir = true

# Enable FFI for fetching real prices in E2E tests
ffi = true

# Allow scripts (e.g. DeployDemoHub) to read/write JSON manifests in the project.
fs_permissions = [{ access = "read-write", path = "./" }]

# RedStoneOracleFacet no longer compiles with the pinned redstone submodule
# (via-ir stack-too-deep inside the RedStone connector). The Base Sepolia
# deployment uses ChainlinkDataStreamsOracleFacet instead, so skip these.
skip = [
    "**/RedStoneOracleFacet.sol",
    "**/DeployGnosis.s.sol",
    "**/DeployAndTestMainnet.s.sol",
    "**/TestDeployedContracts.s.sol",
]

# RPC endpoints
[rpc_endpoints]
gnosis = "${GNOSIS_RPC_URL}"

# Etherscan API keys for verification
[etherscan]
gnosis = { key = "${GNOSISSCAN_API_KEY}", url = "https://api.gnosisscan.io/api" }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
