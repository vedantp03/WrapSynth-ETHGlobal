<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Grid</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { padding: 20px; font-family: monospace; }
        
        .debug-info {
            background: #f0f0f0;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 2rem;
            margin-top: 2rem;
            width: 100%;
            max-width: 100%;
            border: 3px solid red;
        }
        
        .swap-column {
            background: lightblue;
            padding: 20px;
            min-height: 300px;
        }
        
        .info-column {
            background: lightgreen;
            padding: 20px;
            min-height: 300px;
        }
        
        @media (max-width: 1400px) {
            .main-grid {
                grid-template-columns: 1fr 350px;
            }
        }
        
        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="debug-info">
        <h2>Debug Info</h2>
        <p>Window Width: <span id="width"></span>px</p>
        <p>Grid Columns: <span id="grid-cols"></span></p>
        <p>Expected: Two columns side-by-side above 768px</p>
    </div>
    
    <div class="main-grid" id="grid">
        <div class="swap-column">
            <h3>LEFT COLUMN (Swap Interface)</h3>
            <p>This should be on the left</p>
        </div>
        <div class="info-column">
            <h3>RIGHT COLUMN (Stats)</h3>
            <p>This should be on the right, NOT at the bottom</p>
        </div>
    </div>
    
    <script>
        function updateDebug() {
            document.getElementById('width').textContent = window.innerWidth;
            const grid = document.getElementById('grid');
            const style = window.getComputedStyle(grid);
            document.getElementById('grid-cols').textContent = style.gridTemplateColumns;
        }
        updateDebug();
        window.addEventListener('resize', updateDebug);
    </script>
</body>
</html>
