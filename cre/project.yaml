# ==========================================================================
# CRE project configuration for the WrapSynth Liquidation Keeper.
#
# Top-level keys are CLI "targets". Each target lists the RPC endpoints the
# workflow may talk to. The WrapSynth hub + LiquidationAlertRegistry live on
# Base Sepolia (chain selector name "ethereum-testnet-sepolia-base-1").
#
# Normally generated by `cre init`; kept here so the project is reproducible.
# ==========================================================================
local-simulation:
  rpcs:
    - chain-name: ethereum-testnet-sepolia-base-1
      url: https://sepolia.base.org

staging-settings:
  rpcs:
    - chain-name: ethereum-testnet-sepolia-base-1
      url: https://sepolia.base.org

production-settings:
  rpcs:
    - chain-name: ethereum-testnet-sepolia-base-1
      url: https://sepolia.base.org
