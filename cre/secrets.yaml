# ==========================================================================
# Secret declarations (manifest of logical secret names).
#
# The liquidation keeper needs NO secrets: it only performs an on-chain read
# (getLiquidatableVaults) and an on-chain write (flagging via a DON-signed
# report). In production the CRE DON signs the write; during local simulation
# it is signed by CRE_ETH_PRIVATE_KEY loaded from your .env file.
#
# If you later add an off-chain notifier (HTTP capability), declare its
# credential here, e.g.:
#
# secrets:
#   - name: NOTIFY_WEBHOOK_URL
#     id: NOTIFY_WEBHOOK_URL
# ==========================================================================
secrets: []
