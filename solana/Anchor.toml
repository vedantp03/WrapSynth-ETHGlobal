[toolchain]

[features]
resolution = true
skip-lint = false

[programs.localnet]
wsxmr_solana = "wsxmrso1ana11111111111111111111111111111111"

[programs.devnet]
wsxmr_solana = "wsxmrso1ana11111111111111111111111111111111"

[programs.mainnet]
wsxmr_solana = "wsxmrso1ana11111111111111111111111111111111"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test]
startup_wait = 10000
